<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Geofencing Alerts | Nestlé Smart Logistics</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans:['DM Sans','sans-serif'], serif:['Cormorant Garamond','serif'] },
          animation: {
            'fade-in':   'fadeIn .6s ease both',
            'slide-in':  'slideIn .5s cubic-bezier(.34,1.56,.64,1) both',
            'pulse-ring':'pulseRing 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
          },
          keyframes: {
            fadeIn:   {'0%':{opacity:'0'},'100%':{opacity:'1'}},
            slideIn:  {'0%':{opacity:'0',transform:'translateY(-16px)'},'100%':{opacity:'1',transform:'none'}},
            pulseRing: {'0%': {transform: 'scale(0.8)', opacity: '0.5'}, '100%': {transform: 'scale(1.5)', opacity: '0'}},
          }
        }
      }
    }
  </script>
  <style>
    /* Premium aesthetics */
    body { background: radial-gradient(ellipse at 50% 0%, #001e3c 0%, #000d1a 60%, #001020 100%); color: rgba(255,255,255,.92); font-family: 'DM Sans', sans-serif; height: 100vh; margin: 0; overflow: hidden; display: flex; flex-direction: column; }
    .glass-panel { background: rgba(0,10,24,.7); backdrop-filter: blur(24px) saturate(1.4); -webkit-backdrop-filter: blur(24px) saturate(1.4); border: 1px solid rgba(255,255,255,.1); box-shadow: 0 10px 40px rgba(0,0,0,.4); }
    
    /* Leaflet overrides for dark mode */
    .leaflet-container { background: #000c1a !important; }
    .leaflet-tile { filter: brightness(0.55) saturate(0.5) hue-rotate(195deg) contrast(1.1); }
    .leaflet-popup-content-wrapper { background: rgba(0,12,30,.95)!important; border: 1px solid rgba(255,255,255,.12)!important; border-radius: 12px!important; color: rgba(255,255,255,.88)!important; box-shadow: 0 10px 40px rgba(0,0,0,.5)!important; }
    .leaflet-popup-tip { background: rgba(0,12,30,.95)!important; }
    .leaflet-popup-close-button { color: rgba(255,255,255,.4)!important; }
    .leaflet-control-zoom a { background: rgba(0,15,35,.9)!important; color: rgba(255,255,255,.7)!important; border-color: rgba(255,255,255,.12)!important; }
    .leaflet-control-attribution { background: rgba(0,0,0,.5)!important; color: rgba(255,255,255,.3)!important; }
    
    /* Geofence pulse animations */
    .geofence-active { animation: pulseRing 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    
    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,.12); border-radius: 2px; }
    
    /* List item transitions */
    .alert-item { transition: all 0.3s ease; }
    .alert-item:hover { transform: translateX(4px); background: rgba(255,255,255,.05); }
  </style>
</head>
<body>

  <!-- Top Navigation -->
  <nav class="glass-panel z-50 flex items-center justify-between px-6 py-4 flex-shrink-0 relative">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 rounded-full flex items-center justify-center" style="border:1px solid rgba(255,255,255,.25); background: rgba(0,86,150,.2);">
        <svg class="w-5 h-5" fill="white" viewBox="0 0 24 24"><path d="M12 2C9.5 2 7.5 3.5 6.5 5.5C5 5.2 3 6.5 3 9c0 2 1.5 3.5 3.5 3.5H17c2 0 4-1.5 4-4 0-2-1.5-3.5-3.5-3.5-.5 0-1 .1-1.5.3C15 3.2 13.5 2 12 2z"/></svg>
      </div>
      <div>
        <div class="text-[11px] tracking-[.18em] uppercase text-white/50">Nestlé Logistics</div>
        <div class="text-[16px] font-medium tracking-wide">Geofence Intelligence</div>
      </div>
    </div>
    <div class="flex items-center gap-4">
      <button onclick="window.location.href='dashboard.html'" class="px-4 py-2 rounded-lg text-[12px] font-semibold tracking-wider uppercase transition-all hover:bg-white/10" style="border: 1px solid rgba(255,255,255,.2);">
        Return to Dashboard
      </button>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="flex flex-1 overflow-hidden relative">
    
    <!-- Map Area -->
    <div id="map" class="w-full h-full z-0"></div>

    <!-- Right Sidebar (Alerts & Zones) -->
    <div class="absolute top-4 right-4 bottom-4 w-[360px] glass-panel rounded-2xl flex flex-col z-10 overflow-hidden transform transition-transform duration-300">
      
      <!-- Stats Summary -->
      <div class="p-5 border-b border-white/10 shrink-0 bg-black/20">
        <h2 class="text-[10px] tracking-[.2em] uppercase text-white/40 mb-3">Live Fleet Status</h2>
        <div class="grid grid-cols-2 gap-3">
          <div class="bg-white/5 rounded-xl p-3 border border-white/10">
            <div class="text-[20px] font-serif text-green-400" id="stat-arrived">0</div>
            <div class="text-[10px] text-white/50 uppercase tracking-wider mt-1">Arrived</div>
          </div>
          <div class="bg-white/5 rounded-xl p-3 border border-white/10">
            <div class="text-[20px] font-serif text-blue-400" id="stat-transit">0</div>
            <div class="text-[10px] text-white/50 uppercase tracking-wider mt-1">In Transit</div>
          </div>
        </div>
      </div>

      <!-- Activity Feed -->
      <div class="flex-1 overflow-y-auto p-4 flex flex-col gap-2" id="alerts-feed">
        <div class="text-[10px] tracking-[.2em] uppercase text-white/40 mb-2 pl-1">Recent Activity</div>
        <!-- Alerts will be injected here -->
        <div class="text-[12px] text-white/30 text-center py-4 italic" id="empty-alerts">Waiting for geofence activity...</div>
      </div>

    </div>

    <!-- Left Sidebar Overlay (Zones List) -->
    <div class="absolute top-4 left-4 bottom-4 w-[280px] glass-panel rounded-2xl flex flex-col z-10 overflow-hidden hidden md:flex">
      <div class="p-4 border-b border-white/10 shrink-0 bg-black/20">
        <h2 class="text-[10px] tracking-[.2em] uppercase text-white/40">Active Geofences (200m)</h2>
      </div>
      <div class="flex-1 overflow-y-auto p-3 flex flex-col gap-2" id="zones-list">
        <!-- Zones injected here -->
      </div>
    </div>

  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, update, push, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
      apiKey:"AIzaSyDtTMrEGjIJ5aJYNJQnARXxXrJDnEUt4vM",
      authDomain:"rural-logistics-app.firebaseapp.com",
      databaseURL:"https://rural-logistics-app-default-rtdb.firebaseio.com",
      projectId:"rural-logistics-app",
      storageBucket:"rural-logistics-app.firebasestorage.app",
      messagingSenderId:"684830139102",
      appId:"1:684830139102:web:850e4e5802aac76335584f"
    };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Map Init
    const map = L.map('map', {zoomControl: false}).setView([6.915, 79.945], 11);
    L.control.zoom({position: 'topleft'}).addTo(map);
    
    // Style adjustments to move the zoom control below the absolute left sidebar
    setTimeout(() => {
        const zoomControl = document.querySelector('.leaflet-control-zoom');
        if (zoomControl) {
            zoomControl.style.marginTop = '20px';
            zoomControl.style.marginLeft = '320px'; // clear the left sidebar (280px + padding)
        }
    }, 100);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    const GEOFENCE_RADIUS_METERS = 200;

    // Define Zones (same as dashboard locations)
    const zones = [
      { id: 'apiit', name: 'APIIT Sri Lanka', lat: 6.9143, lng: 79.8625, status: 'PENDING' },
      { id: 'townhall', name: 'Colombo Town Hall', lat: 6.9218, lng: 79.8632, status: 'PENDING' },
      { id: 'kaduwela', name: 'Kaduwela Rural Farm', lat: 6.9340, lng: 80.0190, status: 'PENDING' },
      { id: 'hanwella', name: 'Hanwella Dairy Co-op', lat: 6.9028, lng: 80.0848, status: 'PENDING' },
      { id: 'malabe', name: 'Malabe Collection Hub', lat: 6.9061, lng: 79.9647, status: 'PENDING' },
      { id: 'welewatta', name: 'Welewatta Collection Center', lat: 6.8674, lng: 81.3554, status: 'PENDING' }
    ];

    const geofenceCircles = {};
    const driverMarkers = {};
    let driversData = {};

    // Colors mapping
    const statusColors = {
      'PENDING': '#f59e0b', // Yellow
      'ACTIVE': '#3b82f6',  // Blue (driver inside but not yet completed)
      'ARRIVED': '#22c55e', // Green
      'COMPLETED': '#ef4444'// Red
    };

    // Initialize Geofence Circles
    zones.forEach(zone => {
      const circle = L.circle([zone.lat, zone.lng], {
        color: statusColors[zone.status],
        fillColor: statusColors[zone.status],
        fillOpacity: 0.15,
        weight: 2,
        radius: GEOFENCE_RADIUS_METERS
      }).addTo(map);
      
      circle.bindPopup(createZonePopup(zone));
      geofenceCircles[zone.id] = circle;
    });
    renderZoneList();

    function createZonePopup(zone, driverName = null, arrivalTime = null) {
      let content = `
        <div class="min-w-[180px] p-1 font-sans">
          <div class="text-[13px] font-bold text-white mb-1">${zone.name}</div>
          <div class="text-[10px] text-white/50 mb-2">Radius: ${GEOFENCE_RADIUS_METERS}m</div>
          <div class="flex items-center gap-2 mb-2">
            <span class="w-2 h-2 rounded-full" style="background: ${statusColors[zone.status]}"></span>
            <span class="text-[11px] font-semibold" style="color: ${statusColors[zone.status]}">${zone.status}</span>
          </div>
      `;
      if (driverName) {
        content += `<div class="text-[11px] text-white/70">Driver: <span class="text-blue-300">${driverName}</span></div>`;
      }
      if (arrivalTime) {
        content += `<div class="text-[10px] text-white/50">Arrived: ${arrivalTime}</div>`;
      }
      content += `</div>`;
      return content;
    }

    function renderZoneList() {
      const container = document.getElementById('zones-list');
      container.innerHTML = zones.map(z => `
        <div class="bg-black/20 border border-white/10 rounded-xl p-3 flex items-center justify-between cursor-pointer hover:bg-white/5 transition-colors" onclick="window.map.setView([${z.lat}, ${z.lng}], 15)">
          <div>
            <div class="text-[12px] font-semibold text-white/90">${z.name}</div>
            <div class="text-[9px] text-white/40 uppercase mt-1 tracking-wider">Status: <span style="color:${statusColors[z.status]}">${z.status}</span></div>
          </div>
          <div class="w-8 h-8 rounded-full flex items-center justify-center border" style="border-color:${statusColors[z.status]}40; background:${statusColors[z.status]}20">
            <div class="w-2.5 h-2.5 rounded-full" style="background:${statusColors[z.status]}"></div>
          </div>
        </div>
      `).join('');
    }
    
    // Make map globally accessible for onclick events in the generated HTML
    window.map = map; 

    // Driver Marker Icon
    function createDriverIcon(isInside) {
      const color = isInside ? '#22c55e' : '#60a5fa';
      return L.divIcon({
        html: `
          <div class="relative w-8 h-8 flex items-center justify-center">
            <div class="absolute inset-0 rounded-full" style="background:${color}; opacity:0.3; animation: pulseRing 2s infinite"></div>
            <div class="w-5 h-5 rounded-full border-2 border-white flex items-center justify-center z-10" style="background:${color}; box-shadow: 0 0 10px ${color}">
              <svg class="w-3 h-3 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>
            </div>
          </div>
        `,
        className: '',
        iconSize: [32, 32],
        iconAnchor: [16, 16]
      });
    }

    // Haversine Distance Calculator
    function calculateDistance(lat1, lon1, lat2, lon2) {
      const R = 6371e3; // metres
      const φ1 = lat1 * Math.PI/180;
      const φ2 = lat2 * Math.PI/180;
      const Δφ = (lat2-lat1) * Math.PI/180;
      const Δλ = (lon2-lon1) * Math.PI/180;

      const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) +
                Math.cos(φ1) * Math.cos(φ2) *
                Math.sin(Δλ/2) * Math.sin(Δλ/2);
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
      return R * c; // in metres
    }

    // Alert Handling
    const recentAlerts = new Set();
    function addAlert(title, message, type = 'info') {
      const alertId = title+message;
      if (recentAlerts.has(alertId)) return;
      recentAlerts.add(alertId);
      setTimeout(() => recentAlerts.delete(alertId), 10000); // Prevent spam

      const container = document.getElementById('alerts-feed');
      document.getElementById('empty-alerts').style.display = 'none';

      const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'});
      const colorClass = type === 'success' ? 'text-green-400' : type === 'warning' ? 'text-yellow-400' : 'text-blue-400';
      const bgClass = type === 'success' ? 'bg-green-400/10 border-green-400/20' : type === 'warning' ? 'bg-yellow-400/10 border-yellow-400/20' : 'bg-blue-400/10 border-blue-400/20';

      const el = document.createElement('div');
      el.className = `alert-item animate-slide-in rounded-xl p-3 border ${bgClass} flex flex-col gap-1`;
      el.innerHTML = `
        <div class="flex justify-between items-start">
          <div class="text-[12px] font-bold ${colorClass}">${title}</div>
          <div class="text-[9px] text-white/40">${time}</div>
        </div>
        <div class="text-[11px] text-white/70">${message}</div>
      `;
      
      container.prepend(el);
      if (container.children.length > 20) container.removeChild(container.lastChild);

      // Save to Firebase for persistent logging (optional)
      push(ref(db, 'geofence_logs'), {
        title, message, type, timestamp: Date.now()
      });
    }

    // Check Geofences
    function checkGeofences(uid, driver) {
      if (!driver.lat || !driver.lng) return false;

      let insideAny = false;
      let arrivedCount = 0;
      let transitCount = 0;

      zones.forEach(zone => {
        const dist = calculateDistance(driver.lat, driver.lng, zone.lat, zone.lng);
        const isInside = dist <= GEOFENCE_RADIUS_METERS;
        const driverTripRef = ref(db, `trips/${uid}`);

        if (isInside) {
          insideAny = true;
          // Trigger entry alert if just entered
          if (zone.status !== 'ARRIVED') {
            zone.status = 'ARRIVED';
            zone.activeDriverUid = uid; // Track who entered
            const timeStr = new Date().toLocaleTimeString();
            
            // Update Circle UI
            geofenceCircles[zone.id].setStyle({ color: statusColors['ARRIVED'], fillColor: statusColors['ARRIVED'] });
            geofenceCircles[zone.id].setPopupContent(createZonePopup(zone, driver.name, timeStr));
            geofenceCircles[zone.id].openPopup();
            
            renderZoneList();
            addAlert('Geofence Entered 📍', `${driver.name} has arrived at ${zone.name}`, 'success');
            
            // Update Backend Status
            update(driverTripRef, {
                status: 'ARRIVED',
                arrival_time: Date.now(),
                alert_status: 'NORMAL'
            });
            // Update center request status if matched
            onValue(ref(db, 'collection_requests/active'), (snap) => {
               const req = snap.val();
               if(req && req.center_name && zone.name.includes(req.center_name) && req.status === 'DISPATCHED') {
                   update(ref(db, 'collection_requests/active'), { status: 'ARRIVED' });
               }
            }, {onlyOnce: true});
          }
        } else {
            // Exited
            if (zone.status === 'ARRIVED' && zone.activeDriverUid === uid) {
                zone.status = 'COMPLETED'; // Assumed collected and left
                zone.activeDriverUid = null;
                geofenceCircles[zone.id].setStyle({ color: statusColors['COMPLETED'], fillColor: statusColors['COMPLETED'] });
                geofenceCircles[zone.id].setPopupContent(createZonePopup(zone));
                renderZoneList();
                addAlert('Geofence Exited 🚛', `${driver.name} has departed from ${zone.name}`, 'warning');
            }
        }
        
        if (zone.status === 'ARRIVED' || zone.status === 'COMPLETED') arrivedCount++;
      });

      // Update counters
      document.getElementById('stat-arrived').textContent = arrivedCount;
      const totalDrivers = Object.keys(driversData).length;
      document.getElementById('stat-transit').textContent = Math.max(0, totalDrivers - arrivedCount);

      return insideAny;
    }

    // Listen to Driver Locations
    onValue(ref(db, 'drivers'), snapshot => {
      const data = snapshot.val() || {};
      
      Object.entries(data).forEach(([uid, d]) => {
        if (!d.lat || !d.lng || d.status !== 'online') {
            if (driverMarkers[uid]) {
                map.removeLayer(driverMarkers[uid]);
                delete driverMarkers[uid];
            }
            return;
        }

        driversData[uid] = d;

        // Animate marker movement
        const isInside = checkGeofences(uid, d);

        if (!driverMarkers[uid]) {
          driverMarkers[uid] = L.marker([d.lat, d.lng], {
            icon: createDriverIcon(isInside)
          }).addTo(map).bindPopup(`<div class="text-[12px] font-bold text-black">${d.name}</div>`);
        } else {
          driverMarkers[uid].setLatLng([d.lat, d.lng]);
          driverMarkers[uid].setIcon(createDriverIcon(isInside));
        }
      });
      
      // Update overall transit stat initially
      const totalDrivers = Object.keys(driversData).length;
      const arrivedCount = parseInt(document.getElementById('stat-arrived').textContent) || 0;
      document.getElementById('stat-transit').textContent = Math.max(0, totalDrivers - arrivedCount);
    });

  </script>
</body>
</html>
